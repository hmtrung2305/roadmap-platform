name: Refresh Market Pulse

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      max_postings:
        description: "Max Jobs API postings to persist for this manual run"
        required: false
        default: "80"

permissions:
  contents: read

concurrency:
  group: market-pulse-refresh
  cancel-in-progress: false

jobs:
  refresh-market-pulse:
    name: Refresh Market Pulse data
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: ${{ secrets.MARKET_PULSE_DB_CONNECTION_STRING }}
      MarketPulse__Enabled: "true"
      MarketPulse__RunOnStartup: "false"
      MarketPulse__ActiveJobsApiUrl: ${{ vars.MARKET_PULSE_ACTIVE_JOBS_API_URL }}
      MarketPulse__TodayJobsApiUrl: ${{ vars.MARKET_PULSE_TODAY_JOBS_API_URL }}
      MarketPulse__Sources__0__Name: "Jobs API"
      MarketPulse__Sources__0__Kind: "JobsApi"
      MarketPulse__Sources__0__BaseUrl: ${{ vars.MARKET_PULSE_JOBS_API_BASE_URL }}
      MarketPulse__Sources__0__SearchUrlTemplate: ${{ vars.MARKET_PULSE_ACTIVE_JOBS_API_URL }}
      MarketPulse__Sources__0__Enabled: "true"
      MarketPulse__MaxPostingsPerSource: ${{ github.event.inputs.max_postings || vars.MARKET_PULSE_MAX_POSTINGS || '500' }}
      MarketPulse__JobsApiPageSize: ${{ vars.MARKET_PULSE_JOBS_API_PAGE_SIZE || '100' }}
      MarketPulse__JobsApiMaxPages: ${{ vars.MARKET_PULSE_JOBS_API_MAX_PAGES || '10' }}
      MarketPulse__RequestTimeoutSeconds: ${{ vars.MARKET_PULSE_REQUEST_TIMEOUT_SECONDS || '30' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Verify required configuration
        shell: bash
        run: |
          if [ -z "$ConnectionStrings__DefaultConnection" ]; then
            echo "Missing MARKET_PULSE_DB_CONNECTION_STRING secret."
            exit 1
          fi
          if [ -z "$MarketPulse__ActiveJobsApiUrl" ]; then
            echo "Missing MARKET_PULSE_ACTIVE_JOBS_API_URL repository variable."
            exit 1
          fi
          if [ -z "$MarketPulse__TodayJobsApiUrl" ]; then
            echo "Missing MARKET_PULSE_TODAY_JOBS_API_URL repository variable."
            exit 1
          fi
          if [ -z "$MarketPulse__Sources__0__BaseUrl" ]; then
            echo "Missing MARKET_PULSE_JOBS_API_BASE_URL repository variable."
            exit 1
          fi

      - name: Restore Market Pulse job
        run: dotnet restore src/backend/RoadmapPlatform.MarketPulseJob/RoadmapPlatform.MarketPulseJob.csproj

      - name: Build Market Pulse job
        run: dotnet build src/backend/RoadmapPlatform.MarketPulseJob/RoadmapPlatform.MarketPulseJob.csproj --configuration Release --no-restore

      - name: Run Market Pulse refresh
        run: dotnet run --project src/backend/RoadmapPlatform.MarketPulseJob/RoadmapPlatform.MarketPulseJob.csproj --configuration Release --no-build
