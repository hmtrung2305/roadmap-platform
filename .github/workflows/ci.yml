name: Roadmap Platform CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: roadmap-platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: .NET restore, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/backend/RoadmapPlatform.slnx

      - name: Build
        run: dotnet build src/backend/RoadmapPlatform.slnx --configuration Release --no-restore

      - name: Test if test projects exist
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find src/backend tests -type f \( -name '*Test*.csproj' -o -name '*Tests*.csproj' \) 2>/dev/null || true)
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No .NET test projects found; build verification completed."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            dotnet test "$project" --configuration Release --no-build
          done

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_BACKEND_BASE_URL: http://127.0.0.1:5208
        run: npm run build

  security-guardrails:
    name: Secret and runtime artifact guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject committed runtime files
        shell: bash
        run: |
          set -euo pipefail
          runtime_files="$(find . \
            -path './.git' -prune -o \
            -path './src/frontend/node_modules' -prune -o \
            \( -name '.env' -o -name '*.db' -o -name '*.sqlite' -o -name '*.sqlite3' \) \
            -print)"
          if [ -n "$runtime_files" ]; then
            echo "Runtime files must not be committed:"
            echo "$runtime_files"
            exit 1
          fi

      - name: Reject hardcoded tunnel hosts
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'https://[[:alnum:]-]+\.ngrok(-free)?\.(app|dev)' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=bin --exclude-dir=obj .; then
            echo "Hardcoded ngrok hosts are not allowed."
            exit 1
          fi

      - name: Reject committed user-secret ids and weak sample passwords
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '<UserSecretsId>|Password=123456|change-me|changeme' \
            --include='*.csproj' --include='appsettings*.json' --exclude-dir=bin --exclude-dir=obj src/backend; then
            echo "Secret ids and weak sample passwords must stay out of committed project/config files."
            exit 1
          fi
