name: Roadmap Platform CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: roadmap-platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: .NET restore, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/backend/RoadmapPlatform.slnx

      - name: Build
        run: dotnet build src/backend/RoadmapPlatform.slnx --configuration Release --no-restore

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t test_projects < <(find src/backend tests -type f \( -name '*Test*.csproj' -o -name '*Tests*.csproj' \) 2>/dev/null || true)
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No .NET test projects found. Backend CI requires tests."
            exit 1
          fi

          for project in "${test_projects[@]}"; do
            dotnet test "$project" --configuration Release --no-build
          done

  frontend:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          VITE_BACKEND_BASE_URL: http://127.0.0.1:5208
        run: npm run build

  database:
    name: Database schema and seed
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: roadmap_platform_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d roadmap_platform_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/roadmap_platform_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/schema.sql

      - name: Seed database
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/seed.sql

      - name: Verify seed idempotency
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/seed.sql

      - name: Verify learning module seed
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f database/seeds/learning-modules/verify-learning-modules.sql

  security-guardrails:
    name: Secret and runtime artifact guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject unresolved merge conflict markers
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>|\|\|\|\|\|\|\|)( .*)?$' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=bin --exclude-dir=obj --exclude-dir=dist .; then
            echo "Unresolved merge conflict markers must be removed before CI can pass."
            exit 1
          fi

      - name: Reject committed runtime files
        shell: bash
        run: |
          set -euo pipefail
          runtime_files="$(find . \
            -path './.git' -prune -o \
            -path './src/frontend/node_modules' -prune -o \
            \( -name '.env' -o -name '*.db' -o -name '*.sqlite' -o -name '*.sqlite3' \) \
            -print)"
          if [ -n "$runtime_files" ]; then
            echo "Runtime files must not be committed:"
            echo "$runtime_files"
            exit 1
          fi

      - name: Reject hardcoded tunnel hosts
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'https://[[:alnum:]-]+\.ngrok(-free)?\.(app|dev)' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=bin --exclude-dir=obj .; then
            echo "Hardcoded ngrok hosts are not allowed."
            exit 1
          fi

      - name: Reject committed user-secret ids and weak sample passwords
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '<UserSecretsId>|Password=123456|change-me|changeme' \
            --include='*.csproj' --include='appsettings*.json' --exclude-dir=bin --exclude-dir=obj src/backend; then
            echo "Secret ids and weak sample passwords must stay out of committed project/config files."
            exit 1
          fi
